<!doctype html>
<!-- <html lang="en"> -->
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phenopi</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}?v={{ static_version('style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='visual_preview.css') }}">
  <script src="{{ url_for('static', path='scheduler_health.js') }}?v={{ static_version('scheduler_health.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <h1>Phenopi</h1>
        <p>Experiment setup and analysis interface</p>
      </div>
      <a id="scheduler-status-pill" class="status-pill status-pill--loading" href="/scheduler" aria-label="Loading scheduler health">
        <span class="status-pill-dot" aria-hidden="true"></span>
        <strong id="scheduler-status">Loading</strong>
        <small id="health-freshness">—</small>
      </a>
    </div>
  </header>

  <main class="layout">
    <nav class="tabs" aria-label="Phenopi sections">
      <a class="tab {% if active_tab == 'schedule' %}active{% endif %}"
        href="/schedule" > Schedule builder </a>

      <a class="tab {% if active_tab == 'camera' %}active{% endif %}"
        href="/camera" > Camera preview </a>

      <a class="tab {% if active_tab == 'scheduler' %}active{% endif %}"
        href="/scheduler"> Scheduler status </a>
      <span class="tab disabled">Acquisition</span>
      <span class="tab disabled">Canopy analysis</span>
      <span class="tab disabled">Growth plots</span>
    </nav>

    {% if error %}
      <section class="alert error">{{ error }}</section>
    {% endif %}
    {% if message %}
      <section class="alert success">{{ message }}</section>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script>
    function updateModeSections() {
      const mode = document.querySelector('input[name="mode"]:checked')?.value;
      for (const section of document.querySelectorAll('[data-mode-section]')) {
        section.hidden = section.dataset.modeSection !== mode;
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      updateModeSections();
      for (const radio of document.querySelectorAll('input[name="mode"]')) {
        radio.addEventListener('change', updateModeSections);
      }
    });
  </script>
</body>
</html>
