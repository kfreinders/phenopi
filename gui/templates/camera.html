{% extends "base.html" %}

{% block page_styles %}
<link rel="stylesheet" href="{{ url_for('static', path='camera_preview.css') }}?v={{ static_version('camera_preview.css') }}">
{% endblock %}

<!-- TODO: Use actual Raspberry Pi camera here instead of webcam -->
{% block content %}
<section class="card camera-page">
  <div class="card-header">
    <div>
      <h2>Camera preview</h2>
    </div>
  </div>

  <div class="camera-preview-layout">
    <section class="camera-feed-card">
      <div class="camera-frame">
        <video
          id="camera-preview"
          autoplay
          playsinline
          muted
        ></video>

        <div id="camera-placeholder" class="camera-placeholder">
          <div class="camera-placeholder-icon">📷</div>
          <h3>No camera active</h3>
          <p>Click “Start preview” to open the webcam preview.</p>
        </div>
      </div>

      <div class="camera-controls">
        <button id="start-camera" type="button">
          Start preview
        </button>
        <button id="stop-camera" type="button" class="secondary" disabled>
          Stop preview
        </button>
      </div>
    </section>

    <aside class="camera-info-card">
      <h3>Preview status</h3>

      <dl class="camera-status-list">
        <div>
          <dt>Status</dt>
          <dd id="camera-status">Inactive</dd>
        </div>
        <div>
          <dt>Source</dt>
          <dd id="camera-source">Browser webcam</dd>
        </div>
        <div>
          <dt>Resolution</dt>
          <dd id="camera-resolution">—</dd>
        </div>
      </dl>

      <!--
        WARNING: Browser webcam access usually requires localhost or HTTPS. If
        this page is opened from another device over plain HTTP, the browser
        may block camera access.
      -->
    </aside>
  </div>
</section>

{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', path='camera_preview.js') }}?v={{ static_version('camera_preview.js') }}" defer></script>
{% endblock %}
